<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日文 Shadowing</title>
<style>
:root { --bg:#0f172a; --muted:#94a3b8; --text:#e5e7eb; --accent:#38bdf8; --green:#22c55e; }
* { box-sizing:border-box; }
body { margin:0; font-family:Arial,"Noto Sans TC",sans-serif; background:linear-gradient(180deg,#020617,#0f172a); color:var(--text); }
.wrap { max-width:980px; margin:0 auto; padding:20px; }
h1 { margin:0 0 14px; font-size:30px; }
.panel { background:rgba(17,24,39,.92); border:1px solid #334155; border-radius:20px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
.controls { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:12px; margin-bottom:16px; }
.controls label { display:flex; flex-direction:column; gap:6px; color:var(--muted); font-size:14px; }
input, select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid #475569; background:#0b1220; color:#fff; font-weight:700; }
.btns { display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 18px; }
button { border:0; border-radius:999px; padding:12px 18px; cursor:pointer; font-weight:800; color:#001018; background:var(--accent); }
button.secondary { background:#cbd5e1; }
button.ghost { background:#1e293b; color:#fff; border:1px solid #475569; }
button.green { background:var(--green); }
.status { color:#f8fafc; background:#0b1220; border:1px solid #334155; border-radius:14px; padding:12px 14px; margin-bottom:12px; font-weight:800; }
.bigcard { background:#020617; border:1px solid #334155; border-radius:20px; padding:18px; margin-bottom:14px; transition:box-shadow .18s ease, background-color .18s ease; }
.bigcard.glow { animation:yellowPulse .65s infinite alternate; }
@keyframes yellowPulse { from { box-shadow:0 0 0 rgba(250,204,21,0); background:#020617; } to { box-shadow:0 0 28px rgba(250,204,21,.75); background:#16130a; } }
.idx { color:var(--accent); font-weight:900; margin-bottom:8px; }
.jp { font-size:34px; line-height:1.5; margin:8px 0 14px; color:#ff4d4f; font-weight:800; }
.meta { display:grid; grid-template-columns:1fr; gap:8px; color:#cbd5e1; }
.meta div { background:#0b1220; padding:10px 12px; border-radius:12px; font-weight:700; }
#kana { color:#ff9900; }
#romaji { color:#ffd84d; }
#zh { color:#22c55e; }
.list { margin-top:14px; max-height:46vh; overflow:auto; border-top:1px solid #334155; padding-top:10px; }
.row { display:grid; grid-template-columns:56px 1.2fr 1fr 1fr; gap:14px; align-items:center; padding:10px 12px; border-radius:12px; border:1px solid transparent; cursor:pointer; transition:background-color .15s ease,color .15s ease,border-color .15s ease; }
.row:hover { background:#0b1220; }
.row.playing { background:#fff59d !important; border-color:#facc15 !important; color:#111827 !important; }
.row.active:not(.playing) { background:#083344; border-color:#38bdf8; }
.row .no { font-weight:900; color:#fff; }
.row.playing .no, .row.playing .small { color:#111827 !important; }
.row .jp2 { font-weight:800; }
.row .small { color:#bfdbfe; font-size:13px; }
.hidden-audio { display:none; }
@media (max-width:860px) {
  .controls { grid-template-columns:1fr 1fr; }
  .row { grid-template-columns:44px 1fr; }
  .row > div:nth-child(3), .row > div:nth-child(4) { grid-column:2; }
  .jp { font-size:27px; }
}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 Shadowing 模式</h1>
  <div class="panel">
    <div class="controls">
      <label>延遲跟讀（毫秒）<input id="delayMs" type="number" min="0" step="100" value="1500"></label>
      <label>播放速度<select id="speed"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option></select></label>
      <label>每句重複次數<select id="repeatCount"><option value="1">1 次</option><option value="2" selected>2 次</option><option value="3">3 次</option></select></label>
      <label>模式<select id="mode"><option value="shadowing" selected>先聽後跟讀</option><option value="repeat">直接重播練習</option></select></label>
    </div>
    <div class="btns">
      <button class="green" id="unlockBtn">🔓 解鎖音訊</button>
      <button id="startBtn">▶️ 從目前句開始</button>
      <button class="secondary" id="pauseBtn">⏸ 暫停/繼續</button>
      <button class="secondary" id="stopBtn">■ 停止</button>
      <button class="ghost" id="prevBtn">⏮ 上一句</button>
      <button class="ghost" id="nextBtn">⏭ 下一句</button>
      <button class="ghost" id="playOneBtn">🔁 單句重播</button>
    </div>
    <div class="status" id="status">狀態：尚未開始。請先按「解鎖音訊」。</div>
    <div class="bigcard" id="bigcard">
      <div class="idx" id="idx"></div>
      <div class="jp" id="jp"></div>
      <div class="meta">
        <div><strong>平假名：</strong><span id="kana"></span></div>
        <div><strong>羅馬拼音：</strong><span id="romaji"></span></div>
        <div><strong>中文：</strong><span id="zh"></span></div>
      </div>
    </div>
    <audio id="player" preload="auto" playsinline webkit-playsinline class="hidden-audio"></audio>
    <div class="list" id="list"></div>
  </div>
</div>
<script>
let DATA = [];

async function loadLesson(){
  try {
    setStatus('lesson.json 載入中…');
    const res = await fetch('lesson.json?v=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('lesson.json 載入失敗：HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('lesson.json 格式錯誤：最外層必須是陣列 []');

    let lastAudio = '';
    let lastSpeaker = '';
    DATA = data.map((x, i) => {
      if (x.audio) lastAudio = x.audio;
      if (x.speaker) lastSpeaker = x.speaker;
const audioName = x.audio || lastAudio || '';
const file = x.file || audioName || '';

return {
  ...x,
  id: x.id ?? (i + 1),
  audio: audioName,
  speaker: x.speaker || lastSpeaker || '',
  jp: x.jp ?? x.text ?? '',
  kana: x.kana ?? '',
  romaji: x.romaji ?? '',
  zh: x.zh ?? '',
  start: Number.isFinite(Number(x.start)) ? Number(x.start) : null,
  end: Number.isFinite(Number(x.end)) ? Number(x.end) : null,
  file
};
    });

    // 第11句以 lesson.json 為準；若舊檔仍是「我想想。」才修成自然語感
    const item11 = DATA.find(x => Number(x.id) === 11);
    if (item11 && item11.zh === '我想想。') item11.zh = '嗯…是呢。';

    current = Math.max(0, Math.min(current, DATA.length - 1));
    renderCurrent(false);
    setStatus(`lesson.json 已載入，共 ${DATA.length} 句`);
  } catch(e) {
    console.error(e);
    DATA = [];
    renderCurrent(false);
    setStatus((e && e.message) ? e.message : 'lesson.json 載入失敗，請確認 lesson.json 與 index.html 在同一層');
  }
}

const player = document.getElementById('player');
const jpEl = document.getElementById('jp');
const kanaEl = document.getElementById('kana');
const romajiEl = document.getElementById('romaji');
const zhEl = document.getElementById('zh');
const idxEl = document.getElementById('idx');
const listEl = document.getElementById('list');
const statusEl = document.getElementById('status');
const bigcardEl = document.getElementById('bigcard');
const delayEl = document.getElementById('delayMs');
const speedEl = document.getElementById('speed');
const repeatEl = document.getElementById('repeatCount');
const modeEl = document.getElementById('mode');
let current = 0;
let unlocked = false;
let running = false;
let paused = false;
let stopRequested = false;
let timer = null;

function setStatus(msg) { statusEl.textContent = '狀態：' + msg; }
function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }
function wait(ms) { return new Promise(resolve => { clearTimer(); timer = setTimeout(() => { timer = null; resolve(); }, ms); }); }
function renderCurrent(active=false) {
  if (!DATA || DATA.length === 0) {
    idxEl.textContent = '第 0 句 / 共 0 句';
    jpEl.textContent = '資料載入中…';
    kanaEl.textContent = '';
    romajiEl.textContent = '';
    zhEl.textContent = '';
    bigcardEl.classList.remove('glow');
    listEl.innerHTML = '';
    return;
  }
  current = Math.max(0, Math.min(current, DATA.length - 1));
  const x = DATA[current];
  idxEl.textContent = `第 ${current+1} 句 / 共 ${DATA.length} 句`;
  jpEl.textContent = x.jp;
  kanaEl.textContent = x.kana;
  romajiEl.textContent = x.romaji;
  zhEl.textContent = x.zh;
  bigcardEl.classList.toggle('glow', active);
  renderList(active);
}
function renderList(active=false) {
  if (!DATA || DATA.length === 0) { listEl.innerHTML = ''; return; }
  listEl.innerHTML = DATA.map((x,i)=>`
    <div class="row ${i===current?'active':''} ${i===current && active ? 'playing' : ''}" data-i="${i}">
      <div class="no">${String(i+1).padStart(2,'0')}</div>
      <div class="jp2">${escapeHtml(x.jp)}</div>
      <div class="small">${escapeHtml(x.kana)}</div>
      <div class="small">${escapeHtml(x.zh)}</div>
    </div>
  `).join('');
  [...listEl.querySelectorAll('.row')].forEach(row => row.addEventListener('click', () => onRowClick(Number(row.dataset.i))));
  const activeRow = listEl.querySelector(active ? '.row.playing' : '.row.active');
  if (activeRow) activeRow.scrollIntoView({block:'nearest'});
}
function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function audioCandidates(seg) {
  const list = [];

  // 你的 lesson.json 使用根目錄 m4a，例如：1_maria_san.m4a
  if (seg.audio) list.push(seg.audio);

  // 若未來有 file 欄位，也允許使用，但不要自動加 audio/
  if (seg.file && seg.file !== seg.audio) list.push(seg.file);

  return [...new Set(list.filter(Boolean))];
}

async function playClip(seg) {
  const candidates = audioCandidates(seg);
  let lastError = null;

  for (const src of candidates) {
    try {
      await playClipFromSource(seg, src);
      return;
    } catch (e) {
      lastError = e;
      console.warn('音檔嘗試失敗：', src, e);
    }
  }

  throw lastError || new Error('音檔載入失敗');
}

function playClipFromSource(seg, src) {
  return new Promise((resolve, reject) => {
    let settled = false;
    const start = Number.isFinite(Number(seg.start)) ? Number(seg.start) : 0;
    const end = Number.isFinite(Number(seg.end)) ? Number(seg.end) : null;
    const rate = parseFloat(speedEl.value || '1') || 1;

    function cleanup() {
      player.removeEventListener('timeupdate', onTimeUpdate);
      player.removeEventListener('ended', onEnded);
      player.removeEventListener('error', onError);
      player.removeEventListener('loadedmetadata', onLoaded);
      player.removeEventListener('canplay', onCanPlay);
    }
    function finish() {
      if (settled) return;
      settled = true;
      cleanup();
      player.pause();
      renderCurrent(false);
      resolve();
    }
    function fail(message) {
      if (settled) return;
      settled = true;
      cleanup();
      player.pause();
      renderCurrent(false);
      reject(new Error(message || ('音檔載入失敗：' + src)));
    }
    function onTimeUpdate() {
      if (end !== null && player.currentTime >= end) finish();
    }
    function onEnded() { finish(); }
    function onError() { fail('音檔載入失敗：' + src); }
    async function startPlay() {
      try {
        player.playbackRate = rate;
        if (Math.abs(player.currentTime - start) > 0.08) player.currentTime = start;
        renderCurrent(true);
        const p = player.play();
        if (p && typeof p.then === 'function') await p;
      } catch (e) {
        fail(e && e.message ? e.message : ('音檔播放失敗：' + src));
      }
    }
    function onLoaded() {
      try {
        player.currentTime = start;
      } catch (e) {}
    }
    function onCanPlay() { startPlay(); }

    try {
      player.pause();
      cleanup();
      player.addEventListener('timeupdate', onTimeUpdate);
      player.addEventListener('ended', onEnded);
      player.addEventListener('error', onError);
      player.addEventListener('loadedmetadata', onLoaded);
      player.addEventListener('canplay', onCanPlay, { once: true });
      player.src = src;
      player.load();
    } catch (e) {
      fail(e && e.message ? e.message : ('音檔設定失敗：' + src));
    }
  });
}
async function runCurrentSegment(onlyOne=false) {
  if (!DATA || DATA.length === 0) { setStatus('lesson.json 尚未載入完成'); return; }
  const seg = DATA[current];
  const repeatCount = onlyOne ? 1 : Math.max(1, parseInt(repeatEl.value,10) || 1);
  const delay = Math.max(0, parseInt(delayEl.value,10) || 0);
  const mode = modeEl.value;
  for (let i=0; i<repeatCount; i++) {
    if (stopRequested) return;
    if (mode === 'shadowing' && i === 0 && repeatCount > 1 && !onlyOne) {
      setStatus(`第 ${current+1} 句：先聽`);
      await playClip(seg);
      if (stopRequested) return;
      setStatus(`第 ${current+1} 句：延遲 ${delay} ms，準備跟讀`);
      renderCurrent(true);
      await wait(delay);
      renderCurrent(false);
      if (stopRequested) return;
    } else {
      const idx = mode === 'shadowing' && repeatCount > 1 && !onlyOne ? i : i+1;
      const total = mode === 'shadowing' && repeatCount > 1 && !onlyOne ? repeatCount-1 : repeatCount;
      setStatus(`第 ${current+1} 句：第 ${idx} / ${total} 次播放`);
      await playClip(seg);
      if (stopRequested) return;
      if (i < repeatCount-1) await wait(250);
    }
  }
  setStatus(`第 ${current+1} 句完成`);
}
async function startSequence() {
  if (!DATA || DATA.length === 0) { alert('lesson.json 尚未載入完成'); return; }
  if (!unlocked) { alert('請先按「解鎖音訊」'); return; }
  if (running) return;
  running = true; paused = false; stopRequested = false;
  try {
    while (current < DATA.length && !stopRequested) {
      renderCurrent(false);
      await runCurrentSegment(false);
      if (stopRequested) break;
      current++;
    }
    if (current >= DATA.length) { current = 0; setStatus('全部播放完成，已回到第一句'); }
  } catch(e) { console.error(e); setStatus(e.message || '播放失敗'); }
  finally { running = false; paused = false; stopRequested = false; renderCurrent(false); }
}
function pauseToggle() {
  if (!running && !player.src) return;
  if (!player.paused) { player.pause(); paused = true; setStatus('已暫停'); bigcardEl.classList.remove('glow'); renderList(false); }
  else { player.play(); paused = false; setStatus(`第 ${current+1} 句：繼續播放`); bigcardEl.classList.add('glow'); renderList(true); }
}
function stopAll() {
  stopRequested = true; running = false; paused = false; clearTimer(); player.pause(); player.removeAttribute('src'); player.load(); bigcardEl.classList.remove('glow'); renderCurrent(false); setStatus('已停止');
}
function jumpTo(i) { current = Math.max(0, Math.min(DATA.length-1, i)); stopAll(); current = i; renderCurrent(false); setStatus(`已切到第 ${current+1} 句`); }
async function onRowClick(i) {
  if (i === current && running) { pauseToggle(); return; }
  current = i;
  if (running) { stopRequested = true; player.pause(); clearTimer(); running = false; await wait(80); stopRequested=false; startSequence(); }
  else { renderCurrent(false); setStatus(`已切到第 ${current+1} 句`); }
}
document.getElementById('unlockBtn').addEventListener('click', async () => {
  try {
    if (!DATA || DATA.length === 0) { await loadLesson(); }
    if (!DATA || DATA.length === 0) throw new Error('lesson.json 尚未載入完成');
    const first = DATA[0];
    const src = audioCandidates(first)[0];
    player.src = src;
    player.muted = true;
    try { if (Number.isFinite(Number(first.start))) player.currentTime = Number(first.start); } catch(e) {}
    await player.play();
    player.pause();
    player.muted = false;
    unlocked = true;
    setStatus(`音訊已解鎖，可以開始播放（共 ${DATA.length} 句）`);
  } catch(e) { console.error(e); alert('解鎖失敗，請確認 audio 資料夾與 HTML 一起上傳，並用 localhost / GitHub Pages 開啟。'); }
});
document.getElementById('startBtn').addEventListener('click', startSequence);
document.getElementById('pauseBtn').addEventListener('click', pauseToggle);
document.getElementById('stopBtn').addEventListener('click', stopAll);
document.getElementById('prevBtn').addEventListener('click', () => jumpTo(current-1));
document.getElementById('nextBtn').addEventListener('click', () => jumpTo(current+1));
document.getElementById('playOneBtn').addEventListener('click', async () => { if (!unlocked) { alert('請先按「解鎖音訊」'); return; } stopAll(); stopRequested=false; await runCurrentSegment(true); });
loadLesson();
</script>
</body>
</html>
