<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Shadowing 模式｜MP3 + TTS fallback 穩定版</title>
<style>
:root{
  --bg:#070b14; --panel:#111827; --panel2:#0f172a; --line:#334155;
  --text:#e5e7eb; --muted:#94a3b8; --blue:#38bdf8; --green:#22c55e;
  --yellow:#facc15; --red:#f87171;
}
*{box-sizing:border-box}
body{
  margin:0; background:linear-gradient(180deg,#050914,#0b1120);
  color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;
}
.wrap{max-width:980px;margin:0 auto;padding:24px 18px 80px}
h1{font-size:clamp(30px,7vw,52px);margin:28px 0 20px;font-weight:900;letter-spacing:-.03em}
.panel{
  background:rgba(17,24,39,.88); border:1px solid var(--line); border-radius:28px;
  padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 22px}
label{display:block;color:var(--muted);font-weight:700;font-size:20px;margin:0 0 10px}
input,select{
  width:100%; background:#0b1220; color:var(--text); border:1px solid var(--line);
  border-radius:20px; padding:17px 22px; font-size:24px; font-weight:800; outline:none;
}
.btns{display:flex;flex-wrap:wrap;gap:16px;margin-top:26px}
button{
  appearance:none; border:1px solid transparent; color:#fff; border-radius:999px;
  padding:18px 28px; font-size:22px; font-weight:900; cursor:pointer;
  background:#1f2937; box-shadow:0 8px 20px rgba(0,0,0,.18);
}
button:disabled{opacity:.42;cursor:not-allowed}
.primary{background:linear-gradient(180deg,#38bdf8,#0ea5e9)}
.green{background:linear-gradient(180deg,#22c55e,#16a34a)}
.gray{background:#cbd5e1;color:#111827}
.dark{background:#172033;border-color:#334155}
.status{
  margin-top:28px; padding:20px 24px; border:1px solid var(--line); border-radius:22px;
  background:#0b1220; font-size:22px; font-weight:900; line-height:1.5;
}
.main{
  margin-top:24px; padding:24px; border-radius:26px; border:1px solid var(--line); background:#0b1220;
}
.main.playing{outline:4px solid rgba(250,204,21,.7); animation:pulse 1s infinite}
@keyframes pulse{50%{outline-color:rgba(250,204,21,.15)}}
.no{color:var(--blue);font-weight:900;font-size:18px}
.jp{font-size:34px;font-weight:900;line-height:1.35;margin:8px 0}
.kana,.romaji,.zh{font-size:20px;color:var(--muted);line-height:1.45;margin:5px 0}
.zh{color:#cbd5e1}
.table-wrap{margin-top:22px;max-height:50vh;overflow:auto;border:1px solid var(--line);border-radius:20px}
table{width:100%;border-collapse:collapse;background:#0b1220}
th,td{padding:13px 12px;border-bottom:1px solid #1f2937;text-align:left;vertical-align:top}
th{position:sticky;top:0;background:#111827;color:#cbd5e1;z-index:1}
tr.active{background:rgba(56,189,248,.16)}
.small{font-size:14px;color:var(--muted);line-height:1.6;margin-top:14px}
.warn{color:var(--yellow)}
.err{color:var(--red)}
.ok{color:#86efac}
@media(max-width:720px){
  .wrap{padding:18px 12px 70px}
  .panel{padding:18px;border-radius:24px}
  .grid{grid-template-columns:1fr;gap:14px}
  label{font-size:18px}
  input,select{font-size:22px;padding:15px 18px}
  button{font-size:20px;padding:16px 22px}
  .jp{font-size:28px}
  .kana,.romaji,.zh{font-size:18px}
  th,td{font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 Shadowing 模式</h1>

  <section class="panel">
    <div class="grid">
      <div>
        <label>延遲跟讀（毫秒）</label>
        <input id="delayMs" type="number" min="0" step="100" value="1500">
      </div>
      <div>
        <label>播放速度</label>
        <select id="rate">
          <option value="0.70">0.70x</option>
          <option value="0.75">0.75x</option>
          <option value="0.80">0.80x</option>
          <option value="0.85">0.85x</option>
          <option value="0.90">0.90x</option>
          <option value="0.95">0.95x</option>
          <option value="1.00" selected>1.0x</option>
          <option value="1.05">1.05x</option>
          <option value="1.10">1.10x</option>
        </select>
      </div>
      <div>
        <label>每句重複次數</label>
        <select id="repeatCount">
          <option value="1">1 次</option>
          <option value="2" selected>2 次</option>
          <option value="3">3 次</option>
          <option value="4">4 次</option>
          <option value="5">5 次</option>
        </select>
      </div>
      <div>
        <label>模式</label>
        <select id="mode">
          <option value="listen-shadow" selected>先聽後跟讀</option>
          <option value="listen-only">只聽原音</option>
        </select>
      </div>
    </div>

    <div class="btns">
      <button id="unlockBtn" class="green">🔓 解鎖音訊</button>
      <button id="startBtn" class="primary" disabled>▶️ 從目前句開始</button>
      <button id="pauseBtn" class="gray" disabled>⏸️ 暫停/繼續</button>
      <button id="stopBtn" class="gray" disabled>■ 停止</button>
      <button id="prevBtn" class="dark" disabled>⏮ 上一句</button>
      <button id="nextBtn" class="dark" disabled>⏭ 下一句</button>
      <button id="replayBtn" class="dark" disabled>🔁 單句重播</button>
    </div>

    <div id="status" class="status">狀態：尚未開始。請先按「解鎖音訊」。</div>

    <div id="mainCard" class="main">
      <div class="no" id="no">第 1 句</div>
      <div class="jp" id="jp">資料載入中……</div>
      <div class="kana" id="kana"></div>
      <div class="romaji" id="romaji"></div>
      <div class="zh" id="zh"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:58px">#</th>
            <th>日文</th>
            <th>平假名 / Romaji</th>
            <th>中文</th>
            <th>音檔</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="small">
      穩定版規則：優先播放 <code>audio/xxx.mp3</code>；若音檔不存在、路徑錯誤、LINE 內建瀏覽器阻擋，會自動改用手機/瀏覽器 TTS。<br>
      建議檔案結構：<code>index.html</code>、<code>lesson.json</code>、<code>audio/001.mp3</code>、<code>audio/002.mp3</code>……
    </div>
  </section>
</div>

<audio id="player" preload="auto" playsinline></audio>

<script>
/* =========================================================
   1) 內建資料：沒有 lesson.json 時仍可跑
   2) 若同層有 lesson.json，會優先載入 lesson.json
   lesson.json 格式：
   { "items":[
     {"id":"001","text":"日本語","kana":"にほんご","romaji":"nihongo","zh":"日文","audio":"audio/001.mp3"}
   ]}
========================================================= */
const BUILTIN_ITEMS = [
  {id:"001", text:"日本地図の歌", kana:"にほんちずのうた", romaji:"nihon chizu no uta", zh:"日本地圖之歌", audio:"audio/001.mp3"},
  {id:"002", text:"北から順番に覚えましょう。", kana:"きたからじゅんばんにおぼえましょう。", romaji:"kita kara junban ni oboemashou", zh:"從北開始依序記吧。", audio:"audio/002.mp3"},
  {id:"003", text:"北海道、青森、岩手。", kana:"ほっかいどう、あおもり、いわて。", romaji:"Hokkaidou, Aomori, Iwate", zh:"北海道、青森、岩手。", audio:"audio/003.mp3"}
];

let ITEMS = [];
let idx = 0;
let audioUnlocked = false;
let playing = false;
let paused = false;
let stopFlag = false;
let currentResolver = null;

const $ = id => document.getElementById(id);
const player = $("player");

function setStatus(msg, cls=""){
  $("status").innerHTML = "狀態：" + msg;
  $("status").className = "status " + cls;
}
function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}
function normalizeItem(x, i){
  const id = String(x.id || x.no || (i+1)).padStart(3, "0");
  return {
    id,
    text: x.text || x.jp || x.japanese || "",
    kana: x.kana || x.hiragana || "",
    romaji: x.romaji || x.roma || "",
    zh: x.zh || x.cn || x.translation || "",
    audio: x.audio || `audio/${id}.mp3`
  };
}
async function loadLesson(){
  try{
    const res = await fetch("lesson.json?v=" + Date.now(), {cache:"no-store"});
    if(res.ok){
      const data = await res.json();
      const arr = Array.isArray(data) ? data : (data.items || []);
      if(arr.length) {
        ITEMS = arr.map(normalizeItem);
        setStatus(`已載入 lesson.json，共 ${ITEMS.length} 句。請按「解鎖音訊」。`, "ok");
        return;
      }
    }
  }catch(e){}
  ITEMS = BUILTIN_ITEMS.map(normalizeItem);
  setStatus(`未找到 lesson.json，使用內建範例 ${ITEMS.length} 句。請按「解鎖音訊」。`, "warn");
}
function render(){
  const item = ITEMS[idx];
  if(!item) return;
  $("no").textContent = `第 ${idx+1} 句 / 共 ${ITEMS.length} 句`;
  $("jp").textContent = item.text;
  $("kana").textContent = item.kana ? `平假名：${item.kana}` : "";
  $("romaji").textContent = item.romaji ? `Romaji：${item.romaji}` : "";
  $("zh").textContent = item.zh ? `中文：${item.zh}` : "";
  [...document.querySelectorAll("tbody tr")].forEach((tr,i)=>tr.classList.toggle("active", i===idx));
}
function renderTable(){
  $("tbody").innerHTML = ITEMS.map((x,i)=>`
    <tr data-i="${i}">
      <td>${i+1}</td>
      <td>${escapeHtml(x.text)}</td>
      <td>${escapeHtml(x.kana)}<br><span style="color:#94a3b8">${escapeHtml(x.romaji)}</span></td>
      <td>${escapeHtml(x.zh)}</td>
      <td><code>${escapeHtml(x.audio)}</code></td>
    </tr>
  `).join("");
  document.querySelectorAll("tbody tr").forEach(tr=>{
    tr.addEventListener("click", ()=>{
      idx = parseInt(tr.dataset.i,10);
      render();
      setStatus(`已切到第 ${idx+1} 句。`);
    });
  });
}
function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function setControls(on){
  $("startBtn").disabled = !audioUnlocked || on;
  $("pauseBtn").disabled = !on;
  $("stopBtn").disabled = !on;
  $("prevBtn").disabled = !audioUnlocked || on || idx<=0;
  $("nextBtn").disabled = !audioUnlocked || on || idx>=ITEMS.length-1;
  $("replayBtn").disabled = !audioUnlocked || on;
}
async function unlockAudio(){
  try{
    // 不再用 MP3 判斷解鎖成功；只用靜音 data URI 解鎖 audio context。
    player.src = "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAACcQCAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICA";
    player.muted = true;
    await player.play().catch(()=>{});
    player.pause();
    player.currentTime = 0;
    player.muted = false;

    audioUnlocked = true;
    $("unlockBtn").disabled = true;
    $("unlockBtn").textContent = "✅ 已解鎖";
    setStatus("音訊已解鎖。若 MP3 不存在，會自動改用 TTS。", "ok");
    setControls(false);
  }catch(e){
    // 即使靜音解鎖失敗，仍允許 TTS fallback。
    audioUnlocked = true;
    $("unlockBtn").disabled = true;
    $("unlockBtn").textContent = "✅ 已啟用 fallback";
    setStatus("瀏覽器未允許 MP3 預解鎖，但已啟用 TTS fallback。請直接播放。", "warn");
    setControls(false);
  }
}
function playMp3(src){
  return new Promise(async (resolve, reject)=>{
    let done = false;
    const finish = ok => {
      if(done) return;
      done = true;
      player.onended = null;
      player.onerror = null;
      currentResolver = null;
      ok ? resolve() : reject(new Error("MP3 failed: " + src));
    };
    currentResolver = () => finish(true);
    try{
      player.pause();
      player.currentTime = 0;
      player.playbackRate = parseFloat($("rate").value);
      player.src = src + (src.includes("?") ? "&" : "?") + "v=" + Date.now();
      player.onended = () => finish(true);
      player.onerror = () => finish(false);
      await player.play();
    }catch(e){
      finish(false);
    }
  });
}
function playTTS(text){
  return new Promise(resolve=>{
    try{
      if(!("speechSynthesis" in window) || !text){
        resolve(); return;
      }
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = Math.max(0.7, Math.min(1.1, parseFloat($("rate").value)));
      u.pitch = 1;
      u.onend = () => resolve();
      u.onerror = () => resolve();
      speechSynthesis.speak(u);
    }catch(e){ resolve(); }
  });
}
async function playSmart(item){
  if(stopFlag) return;
  try{
    setStatus(`MP3播放中：第 ${idx+1} 句（速度 ${$("rate").value}x）`);
    await playMp3(item.audio);
  }catch(e){
    setStatus(`MP3無法播放，已自動改用 TTS：第 ${idx+1} 句`, "warn");
    await playTTS(item.text);
  }
}
async function playCurrentOnce(){
  const item = ITEMS[idx];
  $("mainCard").classList.add("playing");
  await playSmart(item);
  $("mainCard").classList.remove("playing");

  if(stopFlag) return;
  if($("mode").value === "listen-shadow"){
    const d = parseInt($("delayMs").value || "0",10);
    if(d>0){
      setStatus(`準備跟讀：第 ${idx+1} 句，等待 ${d} ms`);
      await sleep(d);
    }
  }
}
async function start(){
  if(playing) return;
  playing = true; stopFlag = false; paused = false;
  setControls(true);

  try{
    while(idx < ITEMS.length && !stopFlag){
      render();
      const repeat = parseInt($("repeatCount").value,10);
      for(let r=1; r<=repeat; r++){
        if(stopFlag) break;
        while(paused && !stopFlag){
          setStatus("已暫停。再按一次「暫停/繼續」可繼續。", "warn");
          await sleep(250);
        }
        setStatus(`第 ${idx+1} 句，第 ${r}/${repeat} 次`);
        await playCurrentOnce();
      }
      if(stopFlag) break;
      idx++;
      if(idx >= ITEMS.length){
        setStatus("全部播放完成。3 秒後回到第一句。", "ok");
        await sleep(3000);
        idx = 0;
        break;
      }
    }
  }finally{
    playing = false; paused = false; stopFlag = false;
    player.pause();
    speechSynthesis?.cancel?.();
    $("mainCard").classList.remove("playing");
    render();
    setControls(false);
  }
}
function stop(){
  stopFlag = true;
  paused = false;
  player.pause();
  speechSynthesis?.cancel?.();
  if(currentResolver) currentResolver();
  setStatus("已停止。");
}
function pauseToggle(){
  if(!playing) return;
  paused = !paused;
  if(paused){
    player.pause();
    speechSynthesis?.pause?.();
  }else{
    player.play().catch(()=>{});
    speechSynthesis?.resume?.();
  }
}
async function replay(){
  if(playing) return;
  playing = true; stopFlag = false;
  setControls(true);
  render();
  await playCurrentOnce();
  playing = false;
  setControls(false);
  setStatus(`單句重播完成：第 ${idx+1} 句。`, "ok");
}
function prev(){
  if(idx>0){ idx--; render(); setControls(false); setStatus(`已切到第 ${idx+1} 句。`); }
}
function next(){
  if(idx<ITEMS.length-1){ idx++; render(); setControls(false); setStatus(`已切到第 ${idx+1} 句。`); }
}

$("unlockBtn").addEventListener("click", unlockAudio);
$("startBtn").addEventListener("click", start);
$("pauseBtn").addEventListener("click", pauseToggle);
$("stopBtn").addEventListener("click", stop);
$("prevBtn").addEventListener("click", prev);
$("nextBtn").addEventListener("click", next);
$("replayBtn").addEventListener("click", replay);

window.addEventListener("beforeunload", ()=>{ player.pause(); speechSynthesis?.cancel?.(); });

(async function init(){
  await loadLesson();
  renderTable();
  render();
  setControls(false);
})();
</script>
</body>
</html>
