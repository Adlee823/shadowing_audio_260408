<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日文 Shadowing｜MP3穩定版</title>
<style>
:root{--bg:#0f172a;--muted:#94a3b8;--text:#e5e7eb;--accent:#38bdf8;--green:#22c55e;--yellow:#facc15}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans TC",sans-serif;background:linear-gradient(180deg,#020617,#0f172a);color:var(--text)}
.wrap{max-width:980px;margin:0 auto;padding:20px}h1{margin:0 0 14px;font-size:28px}.panel{background:rgba(17,24,39,.92);border:1px solid #334155;border-radius:20px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.controls{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px;margin-bottom:16px}.controls label{display:flex;flex-direction:column;gap:6px;color:var(--muted);font-size:14px}
input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #475569;background:#0b1220;color:#fff;font-weight:700}.btns{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 18px}
button{border:0;border-radius:999px;padding:12px 18px;cursor:pointer;font-weight:800;color:#001018;background:var(--accent)}button.secondary{background:#cbd5e1}button.ghost{background:#1e293b;color:#fff;border:1px solid #475569}button.green{background:var(--green)}
.status{color:#f8fafc;background:#0b1220;border:1px solid #334155;border-radius:14px;padding:12px 14px;margin-bottom:12px;font-weight:800}.bigcard{background:#020617;border:1px solid #334155;border-radius:20px;padding:18px;margin-bottom:14px;transition:box-shadow .18s ease,background-color .18s ease}.bigcard.glow{animation:yellowPulse .65s infinite alternate}@keyframes yellowPulse{from{box-shadow:0 0 0 rgba(250,204,21,0);background:#020617}to{box-shadow:0 0 28px rgba(250,204,21,.75);background:#16130a}}
.idx{color:var(--accent);font-weight:900;margin-bottom:8px}.jp{font-size:34px;line-height:1.5;margin:8px 0 14px;color:#ff4d4f;font-weight:800}.meta{display:grid;grid-template-columns:1fr;gap:8px;color:#cbd5e1}.meta div{background:#0b1220;padding:10px 12px;border-radius:12px;font-weight:700}#kana{color:#ff9900}#romaji{color:#ffd84d}#zh{color:#22c55e}
.list{margin-top:14px;max-height:46vh;overflow:auto;border-top:1px solid #334155;padding-top:10px}.row{display:grid;grid-template-columns:56px 1.2fr 1fr 1fr;gap:14px;align-items:center;padding:10px 12px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:.15s}.row:hover{background:#0b1220}.row.playing{background:#fff59d!important;border-color:#facc15!important;color:#111827!important}.row.active:not(.playing){background:#083344;border-color:#38bdf8}.row .no{font-weight:900;color:#fff}.row.playing .no,.row.playing .small{color:#111827!important}.row .jp2{font-weight:800}.row .small{color:#bfdbfe;font-size:13px}.hidden-audio{display:none}
@media(max-width:860px){.controls{grid-template-columns:1fr 1fr}.row{grid-template-columns:44px 1fr}.row>div:nth-child(3),.row>div:nth-child(4){grid-column:2}.jp{font-size:27px}}
</style>
</head>
<body>
<div class="wrap"><h1>🎧 Shadowing 模式｜MP3穩定版</h1><div class="panel">
<div class="controls">
<label>延遲跟讀（毫秒）<input id="delayMs" type="number" min="0" step="100" value="1500"></label>
<label>播放速度<select id="speed"><option value="0.8">0.8x</option><option value="0.9">0.9x</option><option value="1" selected>1.0x</option><option value="1.1">1.1x</option></select></label>
<label>每句重複次數<select id="repeatCount"><option value="1">1 次</option><option value="2" selected>2 次</option><option value="3">3 次</option></select></label>
<label>模式<select id="mode"><option value="shadowing" selected>先聽後跟讀</option><option value="repeat">直接重播練習</option></select></label>
</div>
<div class="btns"><button class="green" id="unlockBtn">🔓 解鎖音訊</button><button id="startBtn">▶️ 從目前句開始</button><button class="secondary" id="pauseBtn">⏸ 暫停/繼續</button><button class="secondary" id="stopBtn">■ 停止</button><button class="ghost" id="prevBtn">⏮ 上一句</button><button class="ghost" id="nextBtn">⏭ 下一句</button><button class="ghost" id="playOneBtn">🔁 單句重播</button></div>
<div class="status" id="status">狀態：lesson.json 載入中…</div>
<div class="bigcard" id="bigcard"><div class="idx" id="idx"></div><div class="jp" id="jp"></div><div class="meta"><div><strong>平假名：</strong><span id="kana"></span></div><div><strong>羅馬拼音：</strong><span id="romaji"></span></div><div><strong>中文：</strong><span id="zh"></span></div></div></div>
<audio id="player" preload="auto" playsinline webkit-playsinline class="hidden-audio"></audio><div class="list" id="list"></div>
</div></div>
<script>
let DATA=[];let current=0;let unlocked=false;let running=false;let stopRequested=false;let timer=null;let pauseResolver=null;
const player=document.getElementById('player'),jpEl=document.getElementById('jp'),kanaEl=document.getElementById('kana'),romajiEl=document.getElementById('romaji'),zhEl=document.getElementById('zh'),idxEl=document.getElementById('idx'),listEl=document.getElementById('list'),statusEl=document.getElementById('status'),bigcardEl=document.getElementById('bigcard'),delayEl=document.getElementById('delayMs'),speedEl=document.getElementById('speed'),repeatEl=document.getElementById('repeatCount'),modeEl=document.getElementById('mode');
function setStatus(msg){statusEl.textContent='狀態：'+msg}function clearTimer(){if(timer){clearTimeout(timer);timer=null}}function wait(ms){return new Promise(r=>{clearTimer();timer=setTimeout(()=>{timer=null;r()},ms)})}
function filesOf(item){if(Array.isArray(item.files)&&item.files.length)return item.files;if(item.file)return [item.file];return []}
async function loadLesson(){try{const res=await fetch('lesson.json?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('lesson.json 載入失敗：HTTP '+res.status);const data=await res.json();if(!Array.isArray(data))throw new Error('lesson.json 最外層必須是陣列 []');DATA=data.map((x,i)=>({...x,id:x.id??i+1,files:Array.isArray(x.files)?x.files:(x.file?[x.file]:[`audio/${String(i+1).padStart(3,'0')}.mp3`]),file:x.file||null,jp:x.jp??x.text??'',kana:x.kana??'',romaji:x.romaji??'',zh:(Number(x.id??i+1)===11?'我想想看…':(x.zh??''))}));current=Math.min(current,DATA.length-1);renderCurrent(false);setStatus(`lesson.json 已載入，共 ${DATA.length} 句。請先解鎖音訊。`)}catch(e){console.error(e);DATA=[];renderCurrent(false);setStatus(e.message||'lesson.json 載入失敗')}}
function renderCurrent(active=false){if(!DATA.length){idxEl.textContent='第 0 句 / 共 0 句';jpEl.textContent='資料載入中…';kanaEl.textContent='';romajiEl.textContent='';zhEl.textContent='';listEl.innerHTML='';return}current=Math.max(0,Math.min(current,DATA.length-1));const x=DATA[current];idxEl.textContent=`第 ${current+1} 句 / 共 ${DATA.length} 句`;jpEl.textContent=x.jp;kanaEl.textContent=x.kana;romajiEl.textContent=x.romaji;zhEl.textContent=x.zh;bigcardEl.classList.toggle('glow',active);renderList(active)}
function renderList(active=false){listEl.innerHTML=DATA.map((x,i)=>`<div class="row ${i===current?'active':''} ${i===current&&active?'playing':''}" data-i="${i}"><div class="no">${String(i+1).padStart(2,'0')}</div><div class="jp2">${esc(x.jp)}</div><div class="small">${esc(x.kana)}</div><div class="small">${esc(x.zh)}</div></div>`).join('');[...listEl.querySelectorAll('.row')].forEach(r=>r.addEventListener('click',()=>onRowClick(Number(r.dataset.i))));const ar=listEl.querySelector(active?'.row.playing':'.row.active');if(ar)ar.scrollIntoView({block:'nearest'})}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
async function playFile(src){return new Promise(async(resolve,reject)=>{try{player.pause();player.onended=null;player.onerror=null;player.src=src;player.playbackRate=parseFloat(speedEl.value||'1')||1;player.currentTime=0;player.onended=()=>resolve();player.onerror=()=>reject(new Error('音檔載入失敗：'+src));const p=player.play();if(p&&p.then)await p}catch(e){reject(e)}})}
async function playItem(item){const fs=filesOf(item);if(!fs.length)throw new Error(`第 ${item.id} 句沒有 file/files`);renderCurrent(true);for(let i=0;i<fs.length;i++){if(stopRequested)break;setStatus(`第 ${current+1} 句：播放 ${i+1}/${fs.length}`);await playFile(fs[i]);if(!stopRequested&&i<fs.length-1)await wait(180)}renderCurrent(false)}
async function runCurrentSegment(onlyOne=false){if(!DATA.length){setStatus('lesson.json 尚未載入完成');return}const item=DATA[current];const repeatCount=onlyOne?1:Math.max(1,parseInt(repeatEl.value,10)||1);const delay=Math.max(0,parseInt(delayEl.value,10)||0);const mode=modeEl.value;for(let i=0;i<repeatCount;i++){if(stopRequested)return;if(mode==='shadowing'&&i===0&&repeatCount>1&&!onlyOne){setStatus(`第 ${current+1} 句：先聽`);await playItem(item);if(stopRequested)return;setStatus(`第 ${current+1} 句：延遲 ${delay} ms，準備跟讀`);renderCurrent(true);await wait(delay);renderCurrent(false);if(stopRequested)return}else{const idx=mode==='shadowing'&&repeatCount>1&&!onlyOne?i:i+1;const total=mode==='shadowing'&&repeatCount>1&&!onlyOne?repeatCount-1:repeatCount;setStatus(`第 ${current+1} 句：第 ${idx} / ${total} 次播放`);await playItem(item);if(stopRequested)return;if(i<repeatCount-1)await wait(250)}}setStatus(`第 ${current+1} 句完成`)}
async function startSequence(){if(!DATA.length){alert('lesson.json 尚未載入完成');return}if(!unlocked){alert('請先按「解鎖音訊」');return}if(running)return;running=true;stopRequested=false;try{while(current<DATA.length&&!stopRequested){renderCurrent(false);await runCurrentSegment(false);if(stopRequested)break;current++}if(current>=DATA.length){current=0;setStatus('全部播放完成，已回到第一句')}}catch(e){console.error(e);setStatus(e.message||'播放失敗')}finally{running=false;stopRequested=false;renderCurrent(false)}}
function pauseToggle(){if(!player.src)return;if(!player.paused){player.pause();setStatus('已暫停');bigcardEl.classList.remove('glow');renderList(false)}else{player.play();setStatus(`第 ${current+1} 句：繼續播放`);bigcardEl.classList.add('glow');renderList(true)}}
function stopAll(){stopRequested=true;running=false;clearTimer();player.pause();player.removeAttribute('src');player.load();bigcardEl.classList.remove('glow');renderCurrent(false);setStatus('已停止')}
function jumpTo(i){stopAll();current=Math.max(0,Math.min(DATA.length-1,i));renderCurrent(false);setStatus(`已切到第 ${current+1} 句`)}
async function onRowClick(i){current=i;if(running){stopRequested=true;player.pause();clearTimer();running=false;await wait(80);stopRequested=false;startSequence()}else{renderCurrent(false);setStatus(`已切到第 ${current+1} 句`)}}
document.getElementById('unlockBtn').addEventListener('click',async()=>{try{if(!DATA.length)await loadLesson();const first=filesOf(DATA[0])[0];if(!first)throw new Error('第一句沒有音檔');player.src=first;player.muted=true;await player.play();player.pause();player.currentTime=0;player.muted=false;unlocked=true;setStatus(`音訊已解鎖，可以開始播放（共 ${DATA.length} 句）`)}catch(e){console.error(e);alert('解鎖失敗：'+(e.message||e))}});
document.getElementById('startBtn').addEventListener('click',startSequence);document.getElementById('pauseBtn').addEventListener('click',pauseToggle);document.getElementById('stopBtn').addEventListener('click',stopAll);document.getElementById('prevBtn').addEventListener('click',()=>jumpTo(current-1));document.getElementById('nextBtn').addEventListener('click',()=>jumpTo(current+1));document.getElementById('playOneBtn').addEventListener('click',async()=>{if(!unlocked){alert('請先按「解鎖音訊」');return}stopAll();stopRequested=false;await runCurrentSegment(true)});
loadLesson();
</script>
</body></html>
